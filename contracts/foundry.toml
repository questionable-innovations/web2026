[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"

[rpc_endpoints]
fuji = "${NEXT_PUBLIC_RPC_URL}"
avalanche = "https://api.avax.network/ext/bc/C/rpc"
anvil = "http://127.0.0.1:8545"

[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api" }
